# ── Database ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:learntrack_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Root@1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────
jwt.secret=learntrack_super_secret_key_change_in_production_2026
jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── File Storage Directory ────────────────────────────────
file.upload-dir=${RAILWAY_VOLUME_MOUNT_PATH:C:/LearnTrackData/uploads}

# Allow circular dependencies (SecurityConfig <-> JwtAuthFilter <-> UserService)
spring.main.allow-circular-references=true

# ── AI Interview (Groq LLM) ──────────────────────────────
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
